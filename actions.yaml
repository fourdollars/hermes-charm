get-status:
  description: Show Hermes Agent status (model, platforms, gateway, sessions)
  params:
    format:
      type: string
      default: "text"
      description: |
        Output format: 'text' (human-readable) or 'json' (structured)

get-dashboard-url:
  description: |
    Get the Hermes Dashboard URL. Starts the dashboard if not already running.
    The dashboard provides web-based management of config, API keys, and sessions.
  params:
    port:
      type: integer
      default: 9119
      description: Dashboard port (default 9119)
    host:
      type: string
      default: "0.0.0.0"
      description: Dashboard bind address (default 0.0.0.0 for remote access)

backup:
  description: |
    Backup Hermes Agent data (sessions, memories, skills, configurations) to a
    timestamped compressed archive. The service will be gracefully stopped before
    backup and restarted after completion.
  params:
    output-path:
      type: string
      default: "/tmp"
      description: Directory where the backup file will be created
    wait-timeout:
      type: integer
      default: 30
      description: Maximum seconds to wait for active processes to complete before backup
    force:
      type: boolean
      default: false
      description: Force backup even if active processes are detected (not recommended)

list-models:
  description: List all configured AI models (primary and additional slots)
  params:
    format:
      type: string
      default: "json"
      description: |
        Output format: 'json' (structured details) or 'text' (simple list)

pairing-list:
  description: Show pending and approved pairing users
