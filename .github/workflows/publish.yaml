name: Publish to CharmHub

on:
  push:
    tags:
      - 'v*'
  workflow_run:
    workflows: ["Test"]
    branches: [main]
    types: [completed]
  workflow_dispatch:
    inputs:
      channel:
        description: 'CharmHub channel to publish to'
        required: true
        default: 'edge'
        type: choice
        options:
          - edge
          - beta
          - candidate
          - stable

jobs:
  publish:
    name: Build and Publish Charm
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Charmcraft
        run: sudo snap install charmcraft --classic

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(git describe --tags --always)
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Pack charm
        run: charmcraft pack --verbose --destructive-mode

      - name: Upload charm artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-charm
          path: hermes_*.charm
          retention-days: 30

      - name: Upload charm to CharmHub
        env:
          CHARMCRAFT_AUTH: ${{ secrets.CHARMCRAFT_TOKEN }}
        run: |
          CHARM_FILE=$(ls hermes_*.charm | head -1)
          echo "Uploading $CHARM_FILE to CharmHub..."

          charmcraft upload $CHARM_FILE --name hermes --format json > upload-result.json
          cat upload-result.json

          REVISION=$(jq -r '.revision' upload-result.json)
          echo "revision=$REVISION" >> $GITHUB_ENV
          echo "Uploaded as revision $REVISION"

      - name: Determine target channel
        id: channel
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANNEL="${{ github.event.inputs.channel }}"
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            # main branch test passed -> edge
            CHANNEL="edge"
          elif [[ "${{ github.ref }}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+-rc ]]; then
            CHANNEL="beta"
          elif [[ "${{ github.ref }}" =~ ^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            CHANNEL="candidate"
          else
            CHANNEL="edge"
          fi
          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "Target channel: $CHANNEL"

      - name: Release to channel
        env:
          CHARMCRAFT_AUTH: ${{ secrets.CHARMCRAFT_TOKEN }}
        run: |
          CHANNEL="${{ steps.channel.outputs.channel }}"
          echo "Releasing revision ${{ env.revision }} to $CHANNEL..."

          charmcraft release hermes \
            --revision=${{ env.revision }} \
            --channel=$CHANNEL

          echo "✓ Successfully released to $CHANNEL channel"

      - name: Get CharmHub status
        env:
          CHARMCRAFT_AUTH: ${{ secrets.CHARMCRAFT_TOKEN }}
        run: |
          echo "Current CharmHub status:"
          charmcraft status hermes

      - name: Create GitHub Release
        if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: hermes_*.charm
          body: |
            ## Hermes Agent Juju Charm ${{ steps.get_version.outputs.version }}

            ### Installation
            ```bash
            juju deploy hermes --channel=${{ steps.channel.outputs.channel }}
            ```

            ### What's Included
            - Hermes Agent Gateway service
            - Systemd service management (hermes.service + hermes-dashboard.service)
            - Multi-platform messaging support (20+ channels)
            - Configurable AI providers
            - Web dashboard (port 9119)

            ### Documentation
            - [Charm Documentation](https://fourdollars.github.io/hermes-charm/)
            - [CharmHub Page](https://charmhub.io/hermes)

            ### CharmHub
            Published to **${{ steps.channel.outputs.channel }}** channel as revision **${{ env.revision }}**
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-alpha') || contains(github.ref, '-beta') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Summary
        if: success()
        run: |
          echo "🎉 Charm successfully published!"
          echo "Channel: ${{ steps.channel.outputs.channel }}"
          echo "Revision: ${{ env.revision }}"
          echo "Version: ${{ steps.get_version.outputs.version }}"
          echo ""
          echo "Install with: juju deploy hermes --channel=${{ steps.channel.outputs.channel }}"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Charm publication failed"
          exit 1

  promote-to-stable:
    name: Promote to Stable
    runs-on: ubuntu-latest
    needs: publish
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, '-')
    environment:
      name: stable
      url: https://charmhub.io/hermes
    steps:
      - name: Install Charmcraft
        run: sudo snap install charmcraft --classic

      - name: Promote to stable
        env:
          CHARMCRAFT_AUTH: ${{ secrets.CHARMCRAFT_TOKEN }}
        run: |
          REVISION=$(charmcraft status hermes --format json | jq -r '.[] | select(.channel == "latest/candidate") | .revision' | head -1)
          echo "Promoting revision $REVISION from candidate to stable..."

          charmcraft release hermes \
            --revision=$REVISION \
            --channel=stable

          echo "✓ Successfully promoted to stable channel!"

      - name: Verify stable release
        env:
          CHARMCRAFT_AUTH: ${{ secrets.CHARMCRAFT_TOKEN }}
        run: |
          charmcraft status hermes
          echo ""
          echo "🎉 Charm is now available on stable channel!"
          echo "Install with: juju deploy hermes"
