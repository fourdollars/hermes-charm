name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Install Python (for YAML validation)
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Run validate.sh
        run: ./validate.sh

  pack:
    runs-on: ubuntu-24.04
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Install charmcraft
        run: sudo snap install charmcraft --classic

      - name: Pack charm
        run: charmcraft pack --verbosity=brief

      - name: Upload charm artifact
        uses: actions/upload-artifact@v4
        with:
          name: hermes-charm
          path: "*.charm"
          retention-days: 30
