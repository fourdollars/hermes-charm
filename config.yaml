options:
  gateway-port:
    type: int
    default: 3000
    description: Port for the Hermes Agent Gateway HTTP/WebSocket server

  install-method:
    type: string
    default: pip
    description: |
      Installation method: 'pip' (stable PyPI release) or 'git' (track main branch via uv)

  version:
    type: string
    default: latest
    description: |
      Hermes Agent version to install. For pip: PyPI version (e.g., 'latest', '2026.5.1').
      For git: branch, tag, or commit hash (default tracks main).

  auto-update:
    type: boolean
    default: false
    description: Automatically update Hermes Agent to latest version on upgrade-charm

  node-version:
    type: string
    default: "22"
    description: Node.js major version to install (minimum 22 required)

  ai-provider:
    type: string
    default: ""
    description: |
      Primary AI model provider. Supported providers:
      - copilot: GitHub Copilot (recommended — set ai-api-key to your GitHub token)
      - anthropic: Anthropic Claude models
      - openai: OpenAI GPT models
      - google: Google Gemini models
      - openrouter: OpenRouter aggregator
      - xai: xAI models
      - groq: Groq models
      - deepseek: DeepSeek models
      - mistral: Mistral AI models
      - ollama: Local Ollama models (no API key needed)
      - bedrock: AWS Bedrock (uses AWS credentials)
      - nous: Nous Portal (OAuth)
      Aliases: github-copilot → copilot, gemini → google

  ai-model:
    type: string
    default: ""
    description: |
      AI model(s) to use. Supports comma-separated list for fallback:
      - Single: claude-opus-4-5
      - Multiple: gpt-4,claude-sonnet-4,gemini-2.5-pro
      First model is primary, rest are fallbacks.

  ai-api-key:
    type: string
    default: ""
    description: |
      API key for the selected AI provider. Required for most providers.
      Not required for: ollama (local), bedrock (AWS credentials), nous (OAuth).

  ai-base-url:
    type: string
    default: ""
    description: |
      Custom API base URL for OpenAI-compatible providers.
      Examples: http://localhost:1234/v1 (LM Studio), http://localhost:8000/v1 (vLLM)


  ai-fallback-models:
    type: string
    default: ""
    description: |
      Comma-separated fallback models in provider/model format.
      These are tried in order when the primary model fails.
      Each provider used here needs its API key configured below.
      Example: "anthropic/claude-sonnet-4,openai/gpt-4,google/gemini-2.5-pro"

  anthropic-api-key:
    type: string
    default: ""
    description: |
      Anthropic API key. Required if ai-provider is 'anthropic' or
      if any fallback model uses Anthropic.

  openai-api-key:
    type: string
    default: ""
    description: |
      OpenAI API key. Required if ai-provider is 'openai' or
      if any fallback model uses OpenAI.

  google-api-key:
    type: string
    default: ""
    description: |
      Google Gemini API key. Required if ai-provider is 'google' or
      if any fallback model uses Google.

  openrouter-api-key:
    type: string
    default: ""
    description: |
      OpenRouter API key. Provides access to 200+ models through a single key.

  deepseek-api-key:
    type: string
    default: ""
    description: DeepSeek API key.

  groq-api-key:
    type: string
    default: ""
    description: Groq API key for fast inference.

  xai-api-key:
    type: string
    default: ""
    description: xAI (Grok) API key.

  mistral-api-key:
    type: string
    default: ""
    description: Mistral AI API key.

  novita-api-key:
    type: string
    default: ""
    description: NovitaAI API key.

  huggingface-token:
    type: string
    default: ""
    description: Hugging Face token (HF_TOKEN) for HF-hosted models.


  telegram-bot-token:
    type: string
    default: ""
    description: |
      Telegram bot token from @BotFather.
      Leave empty to disable Telegram messaging.

  discord-bot-token:
    type: string
    default: ""
    description: |
      Discord bot token from Discord Developer Portal.
      Leave empty to disable Discord messaging.

  slack-bot-token:
    type: string
    default: ""
    description: |
      Slack bot token (xoxb-...) from Slack App settings.
      Leave empty to disable Slack messaging.

  slack-app-token:
    type: string
    default: ""
    description: |
      Slack app token (xapp-...) from Slack App settings.
      Required when slack-bot-token is configured.

  signal-phone-number:
    type: string
    default: ""
    description: |
      Signal phone number for Signal messaging.
      Leave empty to disable Signal messaging.

  line-channel-access-token:
    type: string
    default: ""
    description: |
      LINE Messaging API channel access token.
      Leave empty to disable LINE messaging.

  line-channel-secret:
    type: string
    default: ""
    description: |
      LINE Messaging API channel secret.
      Required when line-channel-access-token is configured.

  dm-policy:
    type: string
    default: pairing
    description: |
      DM access policy: 'pairing' (require pairing code), 'open' (auto-respond),
      or 'closed' (reject all DMs)

  log-level:
    type: string
    default: info
    description: Log level (debug, info, warn, error)

  manual:
    type: boolean
    default: false
    description: |
      Manual configuration mode. When enabled:
      - Charm will NOT auto-generate config.yaml or .env
      - User manages ~/.hermes/ configuration manually
      - Charm only installs Hermes Agent and manages the systemd service

  install-pkgs:
    type: string
    default: ""
    description: |
      Comma-separated list of extra packages to install.
      Supported: 'chrome', 'chromium', 'firefox', 'tailscale'.

  personality:
    type: string
    default: ""
    description: |
      Agent personality preset (e.g., 'kawaii', 'professional', 'pirate').
      Leave empty for default personality.

  soul-md:
    type: string
    default: ""
    description: |
      Custom SOUL.md content — defines the agent's identity and personality.
      This overrides the default SOUL.md in ~/.hermes/.
      Multi-line YAML string supported.

  terminal-backend:
    type: string
    default: local
    description: |
      Terminal backend for shell commands:
      - 'local': run commands locally on the charm unit
      - 'docker': run in Docker containers
      - 'ssh': run on remote hosts via SSH

  compression-enabled:
    type: boolean
    default: true
    description: Enable context compression when conversation grows long

  max-turns:
    type: int
    default: 90
    description: Maximum agent turns per conversation before requiring reset

  gateway-allow-all-users:
    type: boolean
    default: false
    description: |
      Allow all users to interact without pairing.
      WARNING: Only set to true in trusted environments.
      When false, users must pair via DM code first.

  home-assistant-url:
    type: string
    default: ""
    description: |
      Home Assistant URL for HA integration (e.g., http://homeassistant.local:8123).
      Leave empty to disable.

  home-assistant-token:
    type: string
    default: ""
    description: |
      Long-lived access token for Home Assistant API.
      Required when home-assistant-url is configured.

  matrix-homeserver:
    type: string
    default: ""
    description: Matrix homeserver URL (e.g., https://matrix.org)

  matrix-user-id:
    type: string
    default: ""
    description: Matrix user ID (e.g., @bot:matrix.org)

  matrix-access-token:
    type: string
    default: ""
    description: Matrix access token for the bot account

  mattermost-url:
    type: string
    default: ""
    description: Mattermost server URL

  mattermost-token:
    type: string
    default: ""
    description: Mattermost bot token

  dashboard-enabled:
    type: boolean
    default: true
    description: |
      Automatically start the Hermes Dashboard web UI as a systemd service.
      Dashboard provides web-based management of config, API keys, and sessions.

  dashboard-port:
    type: int
    default: 9119
    description: Port for the Hermes Dashboard web UI

  dashboard-host:
    type: string
    default: "0.0.0.0"
    description: |
      Dashboard bind address. Default '0.0.0.0' allows remote access.
      Set to '127.0.0.1' to restrict to localhost only (use SSH tunnel for remote).
      WARNING: Dashboard exposes API keys — use with caution on untrusted networks.
